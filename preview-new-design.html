<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>金价计算器 - 新设计预览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #f5f7fa;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h2 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            margin-bottom: 30px;
        }

        .section-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #333;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #eee;
        }

        .section-title.current {
            border-bottom-color: #4a90d9;
        }

        .section-title.buy {
            border-bottom-color: #f5a623;
        }

        .form-group {
            margin-bottom: 24px;
        }

        /* 标签样式 - 独立色块 */
        label {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 14px;
            border-radius: 8px 8px 0 0;
            font-weight: 600;
            font-size: 0.95rem;
            color: white;
        }

        .label-current {
            background: linear-gradient(135deg, #4a90d9 0%, #357abd 100%);
        }

        .label-buy {
            background: linear-gradient(135deg, #f5a623 0%, #d48806 100%);
        }

        .label-icon {
            font-size: 1.2rem;
        }

        /* 输入框样式 */
        .input-wrapper {
            display: flex;
            border: 2px solid #e0e0e0;
            border-top: none;
            border-radius: 0 0 8px 8px;
            overflow: hidden;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .input-wrapper:focus-within {
            border-color: #4a90d9;
            box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.15);
        }

        .input-wrapper.buy:focus-within {
            border-color: #f5a623;
            box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.15);
        }

        input[type="number"] {
            flex: 1;
            padding: 16px 18px;
            border: none;
            font-size: 1.1rem;
            font-weight: 500;
            outline: none;
        }

        input[type="number"]::placeholder {
            color: #aaa;
        }

        .unit {
            padding: 16px 20px;
            background: #f8f9fa;
            color: #666;
            font-weight: 600;
            font-size: 0.95rem;
            border-left: 1px solid #e0e0e0;
            min-width: 70px;
            text-align: center;
        }

        /* 对比展示 */
        .comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .comparison-item {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 12px;
        }

        .comparison-label {
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 8px;
        }

        .comparison-value {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .comparison-value.blue {
            color: #4a90d9;
        }

        .comparison-value.orange {
            color: #f5a623;
        }

        .preview-note {
            text-align: center;
            color: #999;
            font-size: 0.9rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🎨 新设计方案预览</h2>

        <!-- 新设计 -->
        <div class="card">
            <div class="section-title current">💼 当前持仓</div>

            <div class="form-group">
                <label class="label-current">
                    <span class="label-icon">💰</span>
                    当前均价
                </label>
                <div class="input-wrapper">
                    <input type="number" placeholder="例如：580" value="580">
                    <span class="unit">元/克</span>
                </div>
            </div>

            <div class="form-group">
                <label class="label-current">
                    <span class="label-icon">⚖️</span>
                    当前克数
                </label>
                <div class="input-wrapper">
                    <input type="number" placeholder="例如：100" value="100">
                    <span class="unit">克</span>
                </div>
            </div>

            <div class="section-title buy">🛒 新买入</div>

            <div class="form-group">
                <label class="label-buy">
                    <span class="label-icon">🏷️</span>
                    买入金价
                </label>
                <div class="input-wrapper buy">
                    <input type="number" placeholder="例如：560" value="560">
                    <span class="unit">元/克</span>
                </div>
            </div>

            <div class="form-group">
                <label class="label-buy">
                    <span class="label-icon">📦</span>
                    买入克数
                </label>
                <div class="input-wrapper buy">
                    <input type="number" placeholder="例如：50" value="50">
                    <span class="unit">克</span>
                </div>
            </div>
        </div>

        <!-- 对比说明 -->
        <div class="comparison">
            <div class="comparison-item">
                <div class="comparison-label">旧设计</div>
                <div class="comparison-value blue">灰色标签</div>
                <div class="comparison-label" style="margin-top:10px">输入框区分度低</div>
            </div>
            <div class="comparison-item">
                <div class="comparison-label">新设计</div>
                <div class="comparison-value orange">彩色标签</div>
                <div class="comparison-label" style="margin-top:10px">输入框独立边框</div>
            </div>
        </div>

        <p class="preview-note">👆 这是新设计预览，确认后我帮你部署</p>
    </div>
</body>
</html>
